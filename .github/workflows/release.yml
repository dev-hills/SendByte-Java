name: Release

# Publishes to Maven Central and creates a GitHub Release whenever a version tag
# (e.g. v0.2.0) is pushed. Requires four repository secrets:
#   CENTRAL_TOKEN_USERNAME  - Central Portal token username
#   CENTRAL_TOKEN_PASSWORD  - Central Portal token password
#   GPG_PRIVATE_KEY         - ASCII-armored GPG secret key (full block)
#   GPG_PASSPHRASE          - passphrase for that GPG key
# See RELEASING.md for how to obtain each.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK and Maven settings
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Build, sign, and publish
        run: mvn -Prelease --batch-mode --no-transfer-progress clean deploy
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
